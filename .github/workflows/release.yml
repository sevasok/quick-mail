name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Windows client
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o quick-mail.exe .

      - name: Build Linux server
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o quick-mail-server ./server

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            quick-mail.exe
            quick-mail-server
          generate_release_notes: true
